project:
  type: manuscript
  output-dir: docs
  render:
    - "*.qmd"
    - "*.ipynb"
    - "!reviews/"
    - "!coverletter.md"

manuscript:
  article: index.qmd

format:
  html:
    callout-appearance: simple
    callout-icon: false
    comments:
      hypothesis: true
    citations-hover: true
    crossrefs-hover: true
    toc: true
    toc-location: left
    title-block-style: manuscript
    title-block-banner-color: "#1D8265"
  docx:
    csl: https://www.zotero.org/styles/proceedings-of-the-royal-society-b
  preprint-pdf:
    csl: https://www.zotero.org/styles/proceedings-of-the-royal-society-b
    formatting:
      draft-format: true

execute:
  freeze: auto
